<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitForge — Build habits with streaks & a heatmap</title>
  <meta name="description" content="A private, free habit tracker: mark daily habits, build streaks, and watch a GitHub-style heatmap fill up. Runs entirely in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true"><span class="blob blob-1"></span><span class="blob blob-2"></span></div>

  <header class="nav">
    <a href="#" class="logo"><span class="logo-mark">🔥</span> Habit<span class="accent">Forge</span></a>
    <nav class="nav-links">
      <a href="#" id="export-btn">Export</a>
      <a href="#" id="import-btn">Import</a>
      <a href="https://github.com/aashishbharti04/habitforge" target="_blank" rel="noopener">GitHub</a>
      <input type="file" id="import-file" accept="application/json" hidden />
    </nav>
  </header>

  <main>
    <section class="head">
      <h1>Forge your <span class="grad">habits</span>.</h1>
      <p class="sub">Check in daily, build streaks, and watch your year fill up. 100% private —
        everything stays in your browser.</p>
      <div class="stats" id="stats"></div>
      <button class="btn btn-primary" id="add-btn" type="button">+ New habit</button>
    </section>

    <section class="add-form" id="add-form" hidden>
      <input id="habit-name" type="text" placeholder="e.g. Read 20 minutes" maxlength="40" />
      <div class="swatches" id="color-swatches"></div>
      <div class="form-actions">
        <button class="btn btn-primary" id="create-habit" type="button">Add</button>
        <button class="btn btn-ghost" id="cancel-habit" type="button">Cancel</button>
      </div>
    </section>

    <section class="habits" id="habits"></section>
    <p class="empty" id="empty" hidden>No habits yet — click <b>+ New habit</b> to start. 🚀</p>
  </main>

  <footer class="footer">
    <nav class="socials" id="socials" aria-label="Social links"></nav>
    <p class="footer-text">Built with <a href="https://github.com/aashishbharti04/habitforge" target="_blank" rel="noopener">HabitForge</a> · 100% in-browser · © <span id="year"></span> Aashish Bharti</p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
